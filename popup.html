
<!DOCTYPE html>
<html>
<head>
  <title>Replica</title>
  <link rel="stylesheet" type="text/css" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="./lib/tweetnacl.min.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="images/icon48.png" alt="Replica Logo" class="logo"/>
      <h1>Replica</h1>
    </header>
    
    <!-- Step 1: Set API URL -->
    <div id="url-section" class="view">
      <div>
        <h2>Backend URL</h2>
        <p>Enter the URL of your Replica backend to get started.</p>
      </div>
      <div class="form-group">
        <label for="apiUrl">Backend URL</label>
        <input type="text" id="apiUrl" placeholder="https://your-backend-url.com">
      </div>
      <button id="saveUrlButton">Continue</button>
      <p id="url-status" class="status-text"></p>
    </div>

    <!-- Step 2: Login -->
    <div id="auth-section" class="view">
      <div>
        <h2>Login</h2>
        <p>Sign in to sync your tabs across devices.</p>
      </div>
      <div class="form-group">
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" placeholder="Your password">
      </div>
      <div class="button-group">
        <button id="backToUrlButton" class="secondary">Back</button>
        <button id="loginButton">Login & Sync</button>
      </div>
      <p id="auth-status" class="status-text"></p>
    </div>

    <!-- Step 3: Main Content -->
    <div id="main-content" class="view">
      <div class="user-info">
        <span>Signed in as: <strong id="loggedInUser"></strong></span>
        <button id="logoutButton" class="logout-button" style="width: auto; padding: 4px 8px; font-size: 12px; height: auto;">Logout</button>
      </div>

      <div class="tabs-container">
        <nav class="tabs-nav">
          <button class="tab-button active" data-tab="tabs-panel">Tabs</button>
          <button class="tab-button" data-tab="settings-panel">Settings</button>
        </nav>

        <div id="tabs-panel" class="tab-content active">
          <button id="syncButton">Sync Now</button>
          <p id="status" class="status-text"></p>
          <ul id="tabsList"></ul>
        </div>

        <div id="settings-panel" class="tab-content">
          <div class="form-group">
              <label for="deviceNameInput">Device Name</label>
              <input type="text" id="deviceNameInput" placeholder="e.g., Work Laptop">
          </div>
           <button id="saveSettingsButton">Save Device Name</button>
          <p id="settings-status" class="status-text"></p>

          <hr class="separator">

          <div class="setting-item">
            <label for="encryptionToggle">Enable End-to-End Encryption</label>
            <input type="checkbox" id="encryptionToggle" class="toggle-switch">
          </div>
          <div id="encryption-key-section" class="form-group" style="display: none;">
              <label for="secretKeyInput">Secret Key</label>
              <textarea id="secretKeyInput" rows="3" placeholder="Paste your secret key here to sync with other devices..."></textarea>
              <div class="button-group">
                <button id="generateKeyButton" class="secondary">Generate New Key</button>
                <button id="saveKeyButton">Save Key</button>
              </div>
              <p id="key-status" class="status-text"></p>
          </div>
          <hr class="separator">
          
          <div class="form-group">
              <div class="setting-header">
                <h2>Shortcuts</h2>
                <button id="manageShortcutsButton" class="secondary" style="width: auto; padding: 4px 12px;">Manage</button>
              </div>
              <div class="shortcut-item">
                  <label for="spotlightShortcut">Toggle Spotlight</label>
                  <input type="text" id="spotlightShortcut" readonly>
              </div>
               <div class="shortcut-item">
                  <label for="favoriteShortcut">Add Favorite</label>
                  <input type="text" id="favoriteShortcut" readonly>
              </div>
          </div>

          <hr class="separator">

          <button id="toggleSpotlightButton">Toggle Spotlight Bar</button>
        </div>
      </div>
    </div>
    
  </div>
  <script src="popup.js"></script>
</body>
</html>
