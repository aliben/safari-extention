
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <title>Tablicate Search</title>
  <link rel="stylesheet" href="spotlight.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="spotlight-wrapper">
    <div id="spotlight-container">
      <div id="search-box">
        <svg id="search-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <div id="search-pill" class="hidden"></div>
        <input type="text" id="search-input" placeholder="Search tabs · b+space bookmarks · f+space favorites · h+space history · r+space recent..." autocomplete="off">
        <div id="sort-container">
          <button class="sort-button active" data-sort="timestamp" title="Sort by Date">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          </button>
          <button class="sort-button" data-sort="alpha" title="Sort Alphabetically">
             <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 8 4-4 4 4"></path><path d="M7 4v16"></path><path d="M20 8h-5"></path><path d="M15 10V6.5a2.5 2.5 0 0 1 5 0V10"></path><path d="M15 14h5l-5 6h5"></path></svg>
          </button>
        </div>
        <div id="sync-indicator" class="sync-indicator">
          <svg class="sync-spin" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        </div>
      </div>
       <div id="tabs-container">
        <button id="tabs-mode-button" class="tab-button active">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          Open Tabs
        </button>
        <button id="bookmarks-mode-button" class="tab-button">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          Bookmarks
        </button>
      </div>
      <div id="device-filter-container">
        <div id="device-filter-list">
          <!-- Device pills will be injected here -->
        </div>
      </div>
      <div id="results-container">
        <ul id="results-list"></ul>
      </div>
      <div id="send-tab-panel" class="hidden">
        <div class="send-tab-header">Send <span id="send-tab-label"></span> to:</div>
        <div id="send-device-list"></div>
      </div>
      <div id="spotlight-footer">
        <span class="footer-hint"><span class="key-combo">↑↓</span> navigate</span>
        <span class="footer-sep">·</span>
        <span class="footer-hint"><span class="key-combo">↵</span> open</span>
        <span class="footer-sep">·</span>
        <span class="footer-hint"><span class="key-combo">⌘C</span> copy URL</span>
        <span class="footer-sep">·</span>
        <span class="footer-hint"><span class="key-combo">⌘⌫</span> close tab</span>
        <span class="footer-sep">·</span>
        <span class="footer-hint"><span class="key-combo">⌘→</span> send to device</span>
        <span class="footer-sep">·</span>
        <span class="footer-hint"><span class="key-combo">⇧⌥F</span> favorite</span>
        <span class="footer-sep">·</span>
        <span class="footer-hint"><span class="key-combo">b·</span> bookmarks <span class="key-combo">f·</span> favorites <span class="key-combo">h·</span> history <span class="key-combo">r·</span> recent</span>
        <span class="footer-sep">·</span>
        <span class="footer-hint"><span class="key-combo">Esc</span> close</span>
      </div>
    </div>
  </div>
  <script src="spotlight.js"></script>
</body>
</html>
