<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'">

    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

    <link rel="stylesheet" href="../Style.css">
    <script src="../Script.js" defer></script>
</head>
<body>
    <img src="../Icon.png" width="128" height="128" alt="tablicate Icon">
    <p class="state-unknown">You can turn on tablicate’s extension in Safari Extensions preferences.</p>
    <p class="state-on">tablicate’s extension is currently on. You can turn it off in Safari Extensions preferences.</p>
    <p class="state-off">tablicate’s extension is currently off. You can turn it on in Safari Extensions preferences.</p>
    <button class="open-preferences">Quit and Open Safari Extensions Preferences…</button>
    <div class="clear-storage-section">
        <button class="clear-storage">Clear Extension Storage</button>
        <button class="clear-storage-confirm" style="display:none;">⚠︎ Confirm — this cannot be undone</button>
        <button class="clear-storage-cancel" style="display:none;">Cancel</button>
        <p class="clear-status"></p>
    </div>
</body>
</html>
